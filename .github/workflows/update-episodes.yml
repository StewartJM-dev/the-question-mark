name: Update episode feed

on:
  schedule:
    # Every 6 hours
    - cron: "0 */6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-episodes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest RSS feed
        run: python3 scripts/fetch_episodes.py

      - name: Commit if changed
        run: |
          git config user.name "question-mark-bot"
          git config user.email "actions@github.com"
          git add data/episodes.json
          if ! git diff --cached --quiet; then
            git commit -m "Update episode feed [automated]"
            git push
          else
            echo "No changes to episode feed."
          fi
