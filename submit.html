<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Submit a Question — The Question Mark Podcast</title>
<meta name="description" content="Send in a question for The Question Mark Podcast.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,500;0,600;1,400&family=Newsreader:ital,wght@0,400;0,500;1,400&family=Special+Elite&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="images/favicon-64.png">
<link rel="apple-touch-icon" href="images/apple-touch-icon.png">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Question Mark">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0c0c0b">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="back-bar">
  <div class="wrap"><a href="index.html" class="back-link">&larr; Back to Home</a></div>
</div>

<header class="banner-image">
  <img src="images/banner.jpg" alt="The Question Mark Podcast — a ministry of Living Word Baptist Church. Questions today. Truth forever.">
</header>

<div class="page-intro">
  <div class="wrap">
    <p class="eyebrow">Submit a question</p>
    <h1>What's on your mind?</h1>
    <p class="lede">Send it in. Listener questions shape future episodes &mdash; there's no question too small or too sharp.</p>
  </div>
</div>

<section style="padding-top:36px;">
  <div class="wrap">

    <!--
      FORM NOTE FOR JOHN:
      GitHub Pages is static and can't process form submissions server-side,
      so this form currently opens the visitor's email client via a mailto:
      link, addressed to thequestionmarkpodcast@yahoo.com. That works with
      zero setup, but has two caveats:
        1. It requires the visitor to have an email client configured.
        2. thequestionmarkpodcast@yahoo.com needs to actually exist —
           per the brief it hasn't been created yet.

      UPGRADE PATH (optional, when ready): swap this for a free Formspree
      form (formspree.io) — sign up, get an endpoint, change the <form>
      action to "https://formspree.io/f/YOUR_ID" and method to "POST",
      remove the JS mailto handler below. That submits silently in-page
      without opening the visitor's mail app.
    -->

    <form class="question-form" id="question-form">
      <div class="field">
        <label for="q-name">Name</label>
        <input type="text" id="q-name" name="name" required>
      </div>
      <div class="field">
        <label for="q-email">Email (optional, if you'd like a reply)</label>
        <input type="email" id="q-email" name="email">
      </div>
      <div class="field">
        <label for="q-question">Your question</label>
        <textarea id="q-question" name="question" required></textarea>
      </div>
      <button type="submit" class="btn btn-solid">Send question</button>
      <p class="form-note">This opens your email app, addressed to the show, with your question filled in.</p>
    </form>

  </div>
</section>

<footer class="site-footer-image">
  <img src="images/footer.jpg" alt="The Question Mark is part of the LWBC Media Ministry. Built by Covenant Creation &amp; Design. Living Word Baptist Church, 40 Hess Lane, Sweet Valley, PA.">
  <a class="footer-hotspot fh-lwbc-logo" href="https://www.facebook.com/profile.php?id=100064349513334" target="_blank" rel="noopener" aria-label="LWBC Media Ministry on Facebook"></a>
  <a class="footer-hotspot fh-lwbc-text" href="https://www.facebook.com/profile.php?id=100064349513334" target="_blank" rel="noopener" aria-label="LWBC Media Ministry on Facebook"></a>
  <a class="footer-hotspot fh-ccd-text" href="https://stewartjm-dev.github.io/covenant-creation-design" target="_blank" rel="noopener" aria-label="Covenant Creation &amp; Design"></a>
  <a class="footer-hotspot fh-home" href="index.html" aria-label="Home"></a>
  <a class="footer-hotspot fh-about" href="about.html" aria-label="About"></a>
  <a class="footer-hotspot fh-episodes" href="episodes.html" aria-label="Episodes"></a>
  <a class="footer-hotspot fh-submit" href="submit.html" aria-label="Submit a Question" aria-current="page"></a>
  <a class="footer-hotspot fh-subscribe" href="subscribe.html" aria-label="Subscribe"></a>
  <a class="footer-hotspot fh-lwbc-address" href="https://www.lwbcsv.com" target="_blank" rel="noopener" aria-label="Living Word Baptist Church website"></a>
</footer>

<script>
  document.getElementById('question-form').addEventListener('submit', function (e) {
    e.preventDefault();
    var name = document.getElementById('q-name').value.trim();
    var email = document.getElementById('q-email').value.trim();
    var question = document.getElementById('q-question').value.trim();

    var subject = 'Question for The Question Mark Podcast';
    var bodyLines = [
      'From: ' + name + (email ? ' (' + email + ')' : ''),
      '',
      question
    ];
    var mailto = 'mailto:thequestionmarkpodcast@yahoo.com'
      + '?subject=' + encodeURIComponent(subject)
      + '&body=' + encodeURIComponent(bodyLines.join('\n'));

    window.location.href = mailto;
  });
</script>
</body>
</html>
